version: '3.8'

services:
  laravel-db:
    image: mysql:8.0
    container_name: laravel-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
    volumes:
      - mysql_laravel_data:/var/lib/mysql
    networks:
      - trioverse-network

  laravel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-api
    restart: always
    expose:
      - "8000"
    depends_on:
      - laravel-db
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - trioverse-network

  laravel-queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-queue
    restart: always
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90
    depends_on:
      - laravel-api
      - laravel-db
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - trioverse-network

volumes:
  mysql_laravel_data:

networks:
  trioverse-network:
    external: true